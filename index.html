<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Practice Dashboard</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h3 { margin-top: 0; color: #495057; }
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .topic-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #f1f3f5;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .topic-label:hover { background: #e9ecef; }
        button {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 10px;
        }
        button:hover { background-color: #0b5ed7; }
        button.secondary {
            background-color: #6c757d;
        }
        button.secondary:hover { background-color: #5c636a; }
        #question-display {
            text-align: center;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 6px;
        }
        #question-image {
            max-width: 100%;
            height: auto;
            display: none;
        }
        #answer-area {
            border-left: 4px solid #198754;
            padding-left: 20px;
            margin-top: 20px;
            display: none;
        }
        .badge {
            background: #e2e3e5;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Online Exam Practice</h2>

    <div class="card">
        <h3>Select Topics to Practice</h3>
        <div id="topics-container" class="topics-grid">
            <p style="color: #6c757d;">Loading topics...</p>
        </div>
        <button id="next-btn">Next Question</button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Question Info: <span id="q-info">None Loaded</span></h3>
            <span id="q-topic" class="badge" style="display: none;"></span>
        </div>
        
        <div id="question-display">
            <p id="placeholder-text">Select topics above and click "Next Question" to begin!</p>
            <img id="question-image" src="" alt="Exam Question">
        </div>

        <button id="show-btn" class="secondary" style="display: none;">Show Answer & Explanation</button>

        <div id="answer-area">
            <h4>Correct Answer: <span id="correct-answer" style="color: #198754;"></span></h4>
            <h5>Explanation:</h5>
            <div id="explanation-text"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
